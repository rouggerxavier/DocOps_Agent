services:
  - type: web
    name: docops-agent
    runtime: docker
    # O Dockerfile unificado faz o build do React (Node) + sobe o Python num único container
    dockerfilePath: ./docker/production/Dockerfile
    envVars:
      # ── Obrigatórias ──────────────────────────────────────────────────────
      - key: GEMINI_API_KEY
        sync: false          # preencher manualmente no dashboard do Render
      - key: JWT_SECRET_KEY
        generateValue: true  # Render gera automaticamente um valor seguro
      # ── Ambiente ─────────────────────────────────────────────────────────
      - key: DOCOPS_ENV
        value: production
      # ── Caminhos de dados ─────────────────────────────────────────────────
      - key: CHROMA_DIR
        value: /app/data/chroma
      - key: BM25_DIR
        value: /app/data/bm25
      - key: DOCS_DIR
        value: /app/docs
      - key: UPLOADS_DIR
        value: /app/uploads
      - key: ARTIFACTS_DIR
        value: /app/artifacts
      - key: INGEST_ALLOWED_DIRS
        value: /app/docs
      # ── SQLite ────────────────────────────────────────────────────────────
      - key: DATABASE_URL
        value: sqlite:////app/data/app.db
      # ── CORS ──────────────────────────────────────────────────────────────
      # Preencher com o(s) domínio(s) reais do frontend (sem wildcard em produção).
      # Exemplo: https://docops.example.com
      - key: CORS_ORIGINS
        sync: false
