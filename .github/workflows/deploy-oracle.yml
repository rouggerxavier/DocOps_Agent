name: Deploy Oracle Backend

on:
  push:
    branches:
      - main
    paths:
      - "docops/**"
      - "requirements.txt"
      - "requirements.lock.txt"
      - "pyproject.toml"
      - "docker/backend/Dockerfile"
      - "docker-compose.yml"
      - ".github/workflows/deploy-oracle.yml"
  workflow_dispatch:

concurrency:
  group: deploy-oracle-main
  cancel-in-progress: true

jobs:
  backend-pytest:
    name: Backend pytest gate
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.lock.txt ]; then
            pip install -r requirements.lock.txt
          else
            pip install -r requirements.txt
          fi

      - name: Run backend pytest gate
        env:
          GEMINI_API_KEY: "ci-fake-key"
          JWT_SECRET_KEY: "ci-jwt-secret-key-32chars-minimum"
        run: python -m pytest -q

  frontend-lint-build:
    name: Frontend lint/build gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Run frontend lint gate
        working-directory: web
        run: npm run lint

      - name: Run frontend build gate
        working-directory: web
        run: npm run build

  deploy:
    needs:
      - backend-pytest
      - frontend-lint-build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          port: 22
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd /home/ubuntu/DocOps_Agent
            git fetch --prune origin main
            git checkout main
            git pull --ff-only origin main
            source .venv/bin/activate
            python --version
            # Oracle host is currently pinned to Python 3.10, so deploy uses the
            # compatible dependency spec instead of the CI lockfile.
            pip install -r requirements.txt
            sudo systemctl restart docops
            sudo systemctl --no-pager --full status docops | head -n 20
            for i in $(seq 1 30); do
              if curl -fsS "http://127.0.0.1:8000/api/health" >/dev/null; then
                echo "Healthcheck OK"
                exit 0
              fi
              if ! sudo systemctl is-active --quiet docops; then
                echo "docops service is not active"
                sudo journalctl -u docops -n 120 --no-pager || true
                exit 1
              fi
              echo "Waiting for docops startup... attempt $i/30"
              sleep 2
            done
            echo "Healthcheck timed out"
            sudo journalctl -u docops -n 120 --no-pager || true
            exit 1
